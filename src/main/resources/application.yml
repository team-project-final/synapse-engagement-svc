spring:
  application:
    name: engagement-svc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    locations:
      - classpath:db/migration/community/group
      - classpath:db/migration/community/group/member
      - classpath:db/migration/gamification/xp

server:
  port: 8080

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
