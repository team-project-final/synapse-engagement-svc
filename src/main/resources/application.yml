spring:
  application:
    name: engagement-svc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    locations:
      - classpath:db/migration/community/group
      - classpath:db/migration/community/group/member
      - classpath:db/migration/community/share
      - classpath:db/migration/gamification/xp
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all

server:
  port: 8083

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: ${JWT_ISSUER:synapse-auth}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topics:
      level-up: ${KAFKA_TOPIC_LEVEL_UP:engagement.gamification.level-up-v1}
      badge-earned: ${KAFKA_TOPIC_BADGE_EARNED:engagement.gamification.badge-earned-v1}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%thread] %logger{36} - %msg%n"
